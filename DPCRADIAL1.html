<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DPC RADIAL | Quản lý pha chế</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; padding: 20px 16px 60px; }
        .dashboard { max-width: 1400px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #0b3b2b 0%, #1a6f4a 100%); padding: 1.5rem 2rem; color: white; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .title-section h1 { font-size: 1.7rem; }
        .title-section p { font-size: 0.85rem; opacity: 0.85; }
        .nav-selector { background: rgba(255,255,255,0.15); border-radius: 60px; padding: 4px 12px; }
        .nav-selector select { background: transparent; border: none; color: white; font-weight: 500; font-size: 1rem; padding: 8px 16px; cursor: pointer; }
        .content-panel { padding: 24px 28px; }
        .btp-search-area { background: #f9fafc; border-radius: 28px; padding: 20px 24px; margin-bottom: 28px; border: 1px solid #e2edf2; display: flex; flex-wrap: wrap; gap: 20px; }
        .btp-box { flex: 2; min-width: 200px; }
        .search-box { flex: 1.5; min-width: 200px; }
        .label-modern { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #4a6f8f; margin-bottom: 6px; display: block; }
        select, .search-input { width: 100%; padding: 12px 16px; font-size: 0.95rem; border: 1px solid #cbdde6; border-radius: 20px; background: white; }
        .info-card { background: #eef3fc; border-left: 6px solid #1e90ff; border-radius: 20px; padding: 14px 20px; margin-bottom: 28px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .info-item { background: white; border-radius: 40px; padding: 8px 18px; }
        .history-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-history { background: #1e90ff; color: white; border: none; border-radius: 40px; padding: 8px 20px; font-weight: 500; cursor: pointer; }
        .btn-excel { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .dc-selectors { display: flex; flex-wrap: wrap; gap: 24px; margin: 20px 0; }
        .dc-card { flex: 1; background: white; border: 1px solid #e2edf2; border-radius: 24px; padding: 12px 20px; }
        .data-table-wrapper { overflow-x: auto; border-radius: 24px; border: 1px solid #e9eef3; margin-top: 12px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th { background: #eef2f7; padding: 14px 12px; text-align: left; font-weight: 600; }
        .data-table td { padding: 12px; border-bottom: 1px solid #ecf3f8; }
        .update-footer { margin-top: 32px; text-align: center; font-size: 0.75rem; color: #6c8eaa; border-top: 1px solid #e2edf2; padding-top: 20px; }
        .btn-logout { position: fixed; bottom: 20px; right: 20px; background: #dc3545; color: white; border: none; border-radius: 40px; padding: 10px 20px; cursor: pointer; z-index: 99; }
        .modal { display: none; position: fixed; z-index: 2100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 24px; width: 90%; max-width: 1000px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e2edf2; }
        .close-modal { font-size: 28px; cursor: pointer; }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e2edf2; }
        .filter-input { padding: 8px 12px; border: 1px solid #cbdde6; border-radius: 20px; width: 200px; margin-bottom: 15px; }
        .toast { position: fixed; bottom: 80px; right: 20px; background: #28a745; color: white; padding: 10px 20px; border-radius: 8px; animation: fadeOut 3s forwards; z-index: 100; }
        .toast.error { background: #dc3545; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,25,40,0.95); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; border-radius: 40px; width: 90%; max-width: 380px; padding: 2rem; text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 60px; }
        .login-card button { width: 100%; background: #1e90ff; border: none; padding: 12px; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; }
        @media (max-width: 680px) { .content-panel { padding: 16px; } .info-card { flex-direction: column; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h3>🔐 ĐĂNG NHẬP RADIAL</h3>
        <input type="text" id="login-username" placeholder="Tài khoản">
        <input type="password" id="login-password" placeholder="Mật khẩu">
        <button onclick="checkLogin()">Đăng nhập</button>
        <div id="login-error" style="color:red; margin-top:10px"></div>
    </div>
</div>

<button class="btn-logout" onclick="logout()">🚪 Đăng xuất</button>

<div class="dashboard">
    <div class="header">
        <div class="title-section">
            <h1>📦 DPC RADIAL · ĐƠN PHA CHẾ</h1>
            <p>Giám sát thông số sản xuất | Tự động lưu lịch sử mã đơn</p>
        </div>
        <div class="nav-selector">
            <select id="edit" onchange="redirect(this.value)">
                <option value="dpc">🏭 DPC RADIAL</option>
                <option value="view">📊 Xem hiệu chỉnh</option>
            </select>
        </div>
    </div>

    <div class="content-panel">
        <div class="btp-search-area">
            <div class="btp-box">
                <span class="label-modern">📌 MÃ BTP / SẢN PHẨM</span>
                <div id="btp"></div>
            </div>
            <div class="search-box">
                <span class="label-modern">🔍 TÌM NHANH BTP</span>
                <div id="sch"></div>
            </div>
        </div>

        <div id="info" class="info-card" style="display: none;">
            <div id="info-content"></div>
            <div class="history-buttons">
                <button class="btn-history btn-excel" onclick="exportToExcel()">📊 Xuất Excel</button>
                <button class="btn-history" onclick="showHistoryModal()">📜 Xem lịch sử</button>
            </div>
        </div>

        <div class="dc-selectors" id="selector-area" style="display: none;">
            <div class="dc-card"><label>🧪 DÂY CHUYỀN GĐ1 / CĐ</label><div id="dcgd1"></div></div>
            <div class="dc-card"><label>⚙️ DÂY CHUYỀN GĐC</label><div id="dcgdc"></div></div>
        </div>

        <div id="cont" class="data-table-wrapper" style="display: none;"></div>
        <div id="update" class="update-footer"></div>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 LỊCH SỬ THAY ĐỔI MÃ ĐƠN</h3>
            <span class="close-modal" onclick="closeHistoryModal()">&times;</span>
        </div>
        <input type="text" id="historyFilter" class="filter-input" placeholder="🔍 Lọc BTP hoặc mã đơn..." onkeyup="renderHistoryTable()">
        <div style="overflow-x: auto;">
            <table class="history-table" id="historyTable">
                <thead><tr><th>STT</th><th>Thời gian</th><th>BTP</th><th>Mã cũ</th><th>Mã mới</th><th>Người dùng</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="data/dataradial.js"></script>
<script>
    const VALID_USER = "admin";
    const VALID_PASS = "123456RA";
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbw48yqt3ZMSToaES3D-ajn1u1rJDNgUrGNs3PcVyt_j62jD-UtAv-4wMAQDn5DPM5d5/exec"; // THAY URL CỦA BẠN
    
    var obj = null, btpview = "", currentMaDon = "", timeold = "Chưa xác định";
    var stac, stoc, stad, stod, nhomds = [], nhomdc = [], nhomd = [], nhomc = [];
    var cloudHistory = [];

    // ========== LOCALSTORAGE LƯU MÃ ĐƠN ==========
    function saveMaDonToLocal(btp, maDon) {
        var saved = localStorage.getItem('dpc_radial_ma_don_map') || '{}';
        var data = JSON.parse(saved);
        data[btp] = { maDon: maDon, time: new Date().toISOString() };
        localStorage.setItem('dpc_radial_ma_don_map', JSON.stringify(data));
    }

    function getSavedMaDon(btp) {
        var saved = localStorage.getItem('dpc_radial_ma_don_map');
        if (!saved) return null;
        var data = JSON.parse(saved);
        return data[btp] ? data[btp].maDon : null;
    }

    function showToast(msg, isError = false) {
        var toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== GOOGLE SHEETS ==========
    async function saveToCloud(btp, oldCode, newCode, user) {
        try {
            await fetch(GOOGLE_SHEET_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ btp, oldCode, newCode, user, deviceInfo: navigator.userAgent })
            });
            return true;
        } catch(e) { return false; }
    }

    async function loadFromCloud() {
        try {
            var res = await fetch(GOOGLE_SHEET_API_URL + '?t=' + Date.now());
            if (res.ok) {
                var data = await res.json();
                cloudHistory = data.data || [];
                return true;
            }
        } catch(e) { console.warn(e); }
        return false;
    }

    async function addHistoryRecord(btp, oldCode, newCode, user) {
        var record = {
            time: new Date().toLocaleString('vi-VN'),
            btp: btp,
            oldCode: oldCode,
            newCode: newCode,
            user: user || localStorage.getItem('dpc_radial_user') || 'admin'
        };
        cloudHistory.unshift(record);
        await saveToCloud(btp, oldCode, newCode, record.user);
        showToast(`✅ Đã lưu: ${btp} | ${oldCode} → ${newCode}`);
    }

    // ========== HIỂN THỊ DỮ LIỆU ==========
    function caldata(val, ch, tole, rou) {
        var v = parseFloat(val);
        if (isNaN(v)) return val;
        var denta = (v * tole) / 100;
        return (ch == 0 ? v - denta : v + denta).toFixed(rou);
    }

    function printgd1(stt, index, indexs, indexc, key, val, btpw) {
        // Giữ nguyên code printgd1 từ file gốc của bạn
        if(key == "HD10 GĐ1 (kg)" || key == "HD23 GĐ1 (g)" || key == "HD11" || key == "HD12" || key == "HD13" || key == "HD14" || key == "HD10 GĐ2 (kg)"){
            if(stt < parseInt(index[0], 10)){
                for (var n = 0; n < indexs.length; n++) { if(indexs[n] == stt) return '<tr style="background:#e8f5e9"><td>' + key + '</td><td>' + val + '</td><td>0</td><td>800</td></tr>'; }
                for (var n = 0; n < indexc.length; n++) { if(indexc[n] == stt) return '<tr style="background:#fff3e0"><td>' + key + '</td><td>' + val + '</td><td>0</td><td>950</td></tr>'; }
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
            }
            else if(stt >= parseInt(index[0],10) && stt < parseInt(index[1],10)){
                if(btpw == "C12" || btpw == "C21") return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,50,2) +'</td><td>'+ caldata(val,1,50,2) +'</td></tr>';
            }
            else if(stt >= parseInt(index[1],10) && stt < parseInt(index[2],10)){
                if(key == "HD23 GĐ1 (g)") return '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>580</td></tr>';
                if(btpw == "C41" || btpw == "C42") return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
                if(btpw == "Y41" || btpw == "Y42") return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,50,2) +'</td><td>'+ caldata(val,1,50,2) +'</td></tr>';
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,40,2) +'</td><td>'+ caldata(val,1,40,2) +'</td></tr>';
            }
            else {
                if(key == "HD23 GĐ1 (g)") return '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>580</td></tr>';
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
            }
        }
        var rowStyle = "";
        if(key == "KL GĐ1 CHƯA HÓA DẺO (kg)" || key == "KL GĐ2 CHƯA HÓA DẺO (kg)") rowStyle = 'style="color:#d9534f"';
        if(key == "THỜI GIAN GĐ1" || key == "THỜI GIAN GĐ2" || key == "THỜI GIAN GĐ3") return '<tr '+rowStyle+'><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
        if(key == "TỐC ĐỘ GĐ1" || key == "TỐC ĐỘ GĐ2" || key == "TỐC ĐỘ GĐ3"){
            if(val.toString().length <= 2) return '<tr '+rowStyle+'><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
            return '<tr '+rowStyle+'><td>' + key + '</td><td>' + val + '</td><td>-10%</td><td>+10%</td></tr>';
        }
        return '<tr '+rowStyle+'><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
    }

    function printgdc(stt, index, key, val) {
        if (stt < parseInt(index[1],10)){
            if(key == "PT01 (g)") return '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>600</td></tr>';
            return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
        }
        else if (stt >= parseInt(index[1],10) && stt < parseInt(index[3],10)){
            if(key == "PT01 (g)") return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,50,0) +'</td><td>'+ caldata(val,1,50,0) +'</td></tr>';
            if(key.substr(0,2) == "XT" && parseInt(key.substr(2,2)) >= 10 && parseInt(key.substr(2,2)) < 40) return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,50,2) +'</td><td>'+ caldata(val,1,50,2) +'</td></tr>';
            if(key.substr(0,2) == "XT" && parseInt(key.substr(2,2)) >= 40 && parseInt(key.substr(2,2)) < 70) return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,20,2) +'</td><td>'+ caldata(val,1,20,2) +'</td></tr>';
            if(key == "THỜI GIAN") return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
            if(key == "TỐC ĐỘ"){
                if(val.toString().length <= 2) return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>-10%</td><td>+10%</td></tr>';
            }
            return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
        }
        else {
            if(key == "PT01 (g)") return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,50,0) +'</td><td>'+ caldata(val,1,50,0) +'</td></tr>';
            if(key == "THỜI GIAN") return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
            if(key == "TỐC ĐỘ"){
                if(val.toString().length <= 2) return '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val,0,10,0) +'</td><td>'+ caldata(val,1,10,0) +'</td></tr>';
                return '<tr><td>' + key + '</td><td>' + val + '</td><td>-10%</td><td>+10%</td></tr>';
            }
            return '<tr><td>' + key + '</td><td>' + val + '</td><td>—</td><td>—</td></tr>';
        }
    }

    window.showdata = function(str) {
        if (!obj || !str) { resetToInitialState(); return; }
        
        btpview = str;
        
        // Tìm mã đơn mới từ data
        var newMaDon = "";
        for (var i = 0; i < obj.gdc.length; i++) {
            if (obj.gdc[i].BTP == str) { newMaDon = obj.gdc[i]["MÃ ĐƠN"] || ""; break; }
        }
        
        // Lấy mã đơn cũ đã lưu
        var oldMaDon = getSavedMaDon(str);
        
        // Nếu có thay đổi và mã cũ khác mã mới → tự động lưu lịch sử
        if (oldMaDon && oldMaDon !== newMaDon && newMaDon !== "") {
            addHistoryRecord(str, oldMaDon, newMaDon, null);
            showToast(`📝 Tự động lưu: ${oldMaDon} → ${newMaDon}`);
        }
        
        // Cập nhật current và lưu lại
        currentMaDon = newMaDon;
        saveMaDonToLocal(str, newMaDon);
        
        // Hiển thị thông tin
        var infoHtml = `<div class="info-item"><span>📄 MÃ ĐƠN:</span> <strong>${newMaDon}</strong></div>`;
        document.getElementById("info-content").innerHTML = infoHtml;
        document.getElementById("info").style.display = "flex";
        
        // Xử lý dây chuyền GĐC
        var tc = 0; stac = 0; stoc = obj.gdc.length;
        for (var i = 0; i < obj.gdc.length; i++) { if (obj.gdc[i].BTP == str) { stac = i; break; } }
        for (var i = stac + 1; i < obj.gdc.length; i++) { if (obj.gdc[i].BTP != str && obj.gdc[i].BTP) { stoc = i; tc = 1; break; } }
        if (tc === 0) stoc = obj.gdc.length;
        
        var printdcgdc = '<select id="dcc" onchange="showdcgdc(this.value)"><option value="">-- Chọn dây chuyền GĐC --</option>';
        for (var i = stac; i < stoc; i++) { if (obj.gdc[i]["DÂY CHUYỀN"]) printdcgdc += '<option value="'+ obj.gdc[i]["DÂY CHUYỀN"] +'">'+ obj.gdc[i]["DÂY CHUYỀN"] +'</option>'; }
        printdcgdc += '</select>';
        document.getElementById("dcgdc").innerHTML = printdcgdc;
        
        // Xử lý dây chuyền GĐ1
        var td = 0; stad = 0; stod = obj.gd1.length;
        for (var i = 0; i < obj.gd1.length; i++) { if (obj.gd1[i].BTP == str) { stad = i; break; } }
        for (var i = stad + 1; i < obj.gd1.length; i++) { if (obj.gd1[i].BTP != str && obj.gd1[i].BTP) { stod = i; td = 1; break; } }
        if (td === 0) stod = obj.gd1.length;
        
        var printdcgd1 = '<select id="dc1" onchange="showdcgd1(this.value)"><option value="">-- Chọn dây chuyền GĐ1/CĐ --</option>';
        for (var i = stad; i < stod; i++) { if (obj.gd1[i]["DÂY CHUYỀN"]) printdcgd1 += '<option value="'+ obj.gd1[i]["DÂY CHUYỀN"] +'">'+ obj.gd1[i]["DÂY CHUYỀN"] +'</option>'; }
        printdcgd1 += '</select>';
        document.getElementById("dcgd1").innerHTML = printdcgd1;
        
        document.getElementById("selector-area").style.display = "flex";
        document.getElementById("cont").style.display = "block";
        document.getElementById("cont").innerHTML = '<div class="message-placeholder">✅ Vui lòng chọn dây chuyền</div>';
    };

    window.showdcgd1 = function(str) {
        if (!str) { document.getElementById("cont").innerHTML = '<div class="message-placeholder">✅ Vui lòng chọn dây chuyền</div>'; return; }
        var dataall = "";
        for (var i = stad; i < stod; i++) {
            if(obj.gd1[i]["DÂY CHUYỀN"] == str){
                var keys = Object.keys(obj.gd1[i]), vals = Object.values(obj.gd1[i]);
                for (var j = 0; j < keys.length; j++) {
                    if(keys[j] != "GROUP" && keys[j] != "BTP" && keys[j] != "MÃ ĐƠN")
                        dataall += printgd1(i, nhomd, nhomds, nhomdc, keys[j], vals[j], btpview);
                }
                break;
            }
        }
        document.getElementById("cont").innerHTML = `<table class="data-table"><thead><tr><th>Thông số GĐ1/CĐ</th><th>Giá trị chuẩn</th><th>Min (HC -)</th><th>Max (HC +)</th></tr></thead><tbody>${dataall}</tbody></table>`;
        document.getElementById("dcc").value = "";
    };

    window.showdcgdc = function(str) {
        if (!str) { document.getElementById("cont").innerHTML = '<div class="message-placeholder">✅ Vui lòng chọn dây chuyền</div>'; return; }
        var dataall = "";
        for (var i = stac; i < stoc; i++) {
            if(obj.gdc[i]["DÂY CHUYỀN"] == str){
                var keys = Object.keys(obj.gdc[i]), vals = Object.values(obj.gdc[i]);
                for (var j = 0; j < keys.length; j++) {
                    if(keys[j] != "GROUP" && keys[j] != "BTP" && keys[j] != "MÃ ĐƠN")
                        dataall += printgdc(i, nhomc, keys[j], vals[j]);
                }
                break;
            }
        }
        document.getElementById("cont").innerHTML = `<table class="data-table"><thead><tr><th>Thông số GĐC</th><th>Giá trị chuẩn</th><th>Min (HC -)</th><th>Max (HC +)</th></tr></thead><tbody>${dataall}</tbody></table>`;
        document.getElementById("dc1").value = "";
    };

    function resetToInitialState() {
        document.getElementById("selector-area").style.display = "none";
        document.getElementById("cont").style.display = "none";
        document.getElementById("info").style.display = "none";
    }

    function seach() {
        if (!obj) return;
        var filter = document.getElementById("myseach").value.trim().toUpperCase();
        var printse = '<option value="">-- Chọn BTP --</option>';
        for (var i = 0; i < obj.gd1.length; i++) {
            if (obj.gd1[i].BTP && (filter === "" || obj.gd1[i].BTP.toUpperCase().indexOf(filter) > -1))
                printse += '<option value="'+ obj.gd1[i].BTP +'">' + obj.gd1[i].BTP + '</option>';
        }
        document.getElementById("btp").innerHTML = '<select id="BTP" onchange="showdata(this.value)">' + printse + '</select>';
    }

    function exportToExcel() {
        var table = document.querySelector('#cont .data-table');
        if (!table) { alert('Không có dữ liệu'); return; }
        var maDon = document.querySelector('#info-content .info-item strong')?.innerText || '';
        var html = `<html><head><meta charset="UTF-8"></head><body>
            <h2>DPC RADIAL - ${btpview}</h2>
            <p>Mã đơn: ${maDon} | Xuất: ${new Date().toLocaleString('vi-VN')}</p>
            ${table.cloneNode(true).outerHTML}
        </body></html>`;
        var blob = new Blob([html], {type: 'application/vnd.ms-excel'});
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `DPC_RADIAL_${btpview}_${Date.now()}.xls`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function renderHistoryTable() {
        var filter = document.getElementById('historyFilter')?.value.toLowerCase() || '';
        var filtered = cloudHistory.filter(item => 
            (item.btp || '').toLowerCase().includes(filter) ||
            (item.oldCode || '').toLowerCase().includes(filter) ||
            (item.newCode || '').toLowerCase().includes(filter)
        );
        var tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';
        if(filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">📭 Chưa có lịch sử</td></tr>'; return; }
        for(var i=0; i<filtered.length; i++){
            var r = tbody.insertRow();
            r.insertCell(0).innerHTML = (i+1).toString();
            r.insertCell(1).innerHTML = filtered[i].time || '';
            r.insertCell(2).innerHTML = filtered[i].btp || '';
            r.insertCell(3).innerHTML = `<span style="color:#dc3545">${filtered[i].oldCode || ''}</span>`;
            r.insertCell(4).innerHTML = `<span style="color:#28a745">${filtered[i].newCode || ''}</span>`;
            r.insertCell(5).innerHTML = filtered[i].user || '';
        }
    }

    function showHistoryModal() {
        document.getElementById('historyModal').style.display = 'block';
        renderHistoryTable();
        loadFromCloud().then(() => renderHistoryTable());
    }

    function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }

    function logout() { localStorage.clear(); location.reload(); }

    function checkLogin() {
        var user = document.getElementById('login-username').value;
        var pass = document.getElementById('login-password').value;
        if(user === VALID_USER && pass === VALID_PASS){
            localStorage.setItem('dpc_radial_logged_in', 'true');
            localStorage.setItem('dpc_radial_user', user);
            document.getElementById('login-overlay').style.display = 'none';
            initializeApp();
        } else {
            document.getElementById('login-error').innerText = '❌ Sai tài khoản hoặc mật khẩu!';
        }
    }

    function initializeApp() {
        if(window.DATA && window.timeold){
            obj = JSON.parse(DATA);
            timeold = window.timeold;
            
            // Khởi tạo nhóm
            nhomc = [];
            var oldg = '', j=0;
            for(var i=0; i<obj.gdc.length; i++){ if(obj.gdc[i].GROUP != oldg && obj.gdc[i].GROUP){ nhomc[j]=i; j++; oldg=obj.gdc[i].GROUP; } }
            nhomds = []; nhomdc = []; nhomd = [];
            var s=0, c=0;
            for(var i=0; i<obj.gd1.length; i++){
                if(obj.gd1[i].GROUP == 'S'){ nhomds[s]=i; s++; }
                if(obj.gd1[i].GROUP == 'C'){ nhomdc[c]=i; c++; }
                if(obj.gd1[i].GROUP == 3) nhomd[0]=i;
                if(obj.gd1[i].GROUP == 4) nhomd[1]=i;
                if(obj.gd1[i].GROUP == 6) nhomd[2]=i;
            }
            
            var printbtp = '<option value="">-- Chọn BTP --</option>';
            for(var i=0; i<obj.gd1.length; i++){ if(obj.gd1[i].BTP) printbtp += '<option value="'+ obj.gd1[i].BTP +'">' + obj.gd1[i].BTP + '</option>'; }
            document.getElementById("btp").innerHTML = '<select id="BTP" onchange="showdata(this.value)">' + printbtp + '</select>';
            document.getElementById("sch").innerHTML = '<input type="text" id="myseach" class="search-input" placeholder="🔎 Nhập mã BTP..." onkeyup="seach()">';
            document.getElementById("update").innerHTML = `<span>📅 Dữ liệu: ${timeold} | ☁️ Lịch sử đồng bộ Cloud</span>`;
            
            resetToInitialState();
            loadFromCloud();
        } else {
            document.getElementById("btp").innerHTML = '<div>⚠️ Không tải được dữ liệu</div>';
        }
    }

    function redirect(address) {
        var factory = "RADIAL";
        if(address == "view") location.href = '../hieuchinh/view.html';
        else location.href = 'DPC'+ factory +'.html';
    }

    window.onclick = function(e) { if(e.target == document.getElementById('historyModal')) closeHistoryModal(); }
    if(localStorage.getItem('dpc_radial_logged_in') === 'true') initializeApp();
    else window.initializeApp = initializeApp;
</script>
</body>
</html>
