function seach() { //tim kiem BTP
    var input, remosp, filter, sel, opt, i, txtValue;
    input = document.getElementById("myseach");
	remosp = input.value.split(' ').join('');
    filter = remosp.toUpperCase();
    sel = document.getElementById("BTP");
    for (i = 0; i < sel.options.length; i++) {
        opt = sel.options[i];
        txtValue = opt.textContent || opt.innerText;
		if(txtValue != 'BTPC'){
			if (txtValue.toUpperCase().indexOf(filter) > -1) {
				sel.options[i].style.display = "";
			} else {
				sel.options[i].style.display = "none";
			}
		}
    }
}

function caldata(val, ch, tole, rou) { //tinh hieu chinh (gia tri, kenh, %gia tri, lam tron)
