function seach() { //tim kiem BTP
    var input, remosp, filter, sel, opt, i, txtValue;
    input = document.getElementById("myseach");
	remosp = input.value.split(' ').join('');
    filter = remosp.toUpperCase();
    sel = document.getElementById("BTP");
    for (i = 0; i < sel.options.length; i++) {
        opt = sel.options[i];
        txtValue = opt.textContent || opt.innerText;
		if(txtValue != 'BTPC'){
			if (txtValue.toUpperCase().indexOf(filter) > -1) {
				sel.options[i].style.display = "";
			} else {
				sel.options[i].style.display = "none";
			}
		}
    }
}

function showdata(str) { // hien thi tuy chon day chuyen

		if (obj.gdc[i].BTP == str){
			stac = i;
		}
	}

		if (obj.gdc[i].BTP != str & obj.gdc[i].BTP != undefined & tc == 0){
			stoc = i;
			tc = 1;
		}
	}

			var keyobj = Object.keys(obj.gdc[i]);
			var valobj = Object.values(obj.gdc[i])
			for (j = 0;j < 3; j++) {

							else { //toc do thay doi
								datael = datael +'<tr><td>' + keyobj[j] + '</td><td>' +valobj[j] + '</td><td>-10%</td><td>+10%</td></tr>'
							}
						}
						else{ //in du lieu con lai khong hieu chinh
							datael = datael +'<tr><td>' + keyobj[j] + '</td><td>' +valobj[j] + '</td><td></td><td></td></tr>'
						}
					}
				}
			}
			dataall = dataall + datael;
		}
	}
	document.getElementById('dcc').getElementsByTagName('option')[0].selected = 'selected';
	document.getElementById("cont").innerHTML = '<table style="width:100%"><tr><th>GĐ 1; CĐ</th><th>Giá trị</th><th>Min</th><th>Max</th></tr> '+ dataall +'</table>'
}

function caldata(val, ch, tole, rou) { //tinh hieu chinh (gia tri, kenh, %gia tri, lam tron)
 var result;
 var value = parseFloat(val)
 var denta = (value * tole)/100
 result = (ch == 0) ? value - denta : value + denta;
 return result.toFixed(rou);
}
</script>
