<script>

var stad = 0;   // gia tri vi tri bat dau btp gd1, cd

var nhomds = []; //gia tri vi tri nhom gd1
var nhomdc = []; //gia tri vi tri nhom gd1
var nhomd = []; //gia tri vi tri nhom gd1

//--------chuong trinh chinh-----
if (window.DATA && window.timeold) {

function seach() { //tim kiem BTP
    var input, remosp, filter, i, sel, txtValue, printse;
    input = document.getElementById("myseach");
	remosp = input.value.split(' ').join('');
    filter = remosp.toUpperCase();
	for (i = 0;i < obj.gd1.length; i++) { //hien thi btp
		if (obj.gd1[i].BTP != undefined){
		    txtValue = obj.gd1[i].BTP;
		    if (txtValue.toUpperCase().indexOf(filter) > -1) {
				printse = printse + '<option value="'+ txtValue +'">' + txtValue + '</option>'; 
			}
		}
	}
	document.getElementById("btp").innerHTML = '<select id="BTP" onchange="showdata(this.value)" ><option value="BTPC">Chọn BTP</option>' + printse + '</select>';

function showdata(str) { // hien thi tuy chon day chuyen
	btpview = str; //lay gia tri btp
	//---------hien thi day chuyen gdc --------------
	info = "";
	var tc = 0;
	for (i in obj.gdc) {
		if (obj.gdc[i].BTP == str){
			stac = i;
		}
	}
	for (i = stac; i < obj.gdc.length; i++) {
		if (obj.gdc[i].BTP != str & obj.gdc[i].BTP != undefined & tc == 0){
			stoc = i;
			tc = 1;
		}
	}
	var printdcgdc = "";
	for (i = stac; i < stoc; i++) {    
		var dataele = "";
		printdcgdc = printdcgdc + '<option value="'+ obj.gdc[i]["DÂY CHUYỀN"] +'">' +obj.gdc[i]["DÂY CHUYỀN"]+ '</option>';
		if (i == stac){ // hien thi thong tin don pha che
			var keyobj = Object.keys(obj.gdc[i]);
			var valobj = Object.values(obj.gdc[i])
			for (j = 0;j < 3; j++) {
				if (keyobj[0] == "GROUP" && j > 0){
					dataele = dataele +'<td>' + keyobj[j] + '</td><td>' +valobj[j] + '</td>'	
				}
				else if(keyobj[0] != "GROUP" && j <2){
					dataele = dataele +'<td>' + keyobj[j] + '</td><td>' +valobj[j] + '</td>'
				}
			}
			info = info + dataele;
		}
	}
	
	//---------hien thi day chuyen gd1,cd --------------
	var td = 0;
	for (i in obj.gd1) {
		if (obj.gd1[i].BTP == str){

		}
	}
	for (i = stad; i < obj.gd1.length; i++) {
		if (obj.gd1[i].BTP != str & obj.gd1[i].BTP != undefined & td == 0){

			td = 1;
		}
	}
	var printdcgd1 = "";
	for (i = stad; i < stod; i++) {    
		printdcgd1 = printdcgd1 + '<option value="'+ obj.gd1[i]["DÂY CHUYỀN"] +'">' +obj.gd1[i]["DÂY CHUYỀN"]+ '</option>';
	}

	document.getElementById("dcgdc").innerHTML = '<select id="dcc" onchange="showdcgdc(this.value)" ><option value="DCC">Chọn dây chuyền GĐC</option>' + printdcgdc + '</select>';
	document.getElementById("dcgd1").innerHTML = '<select id="dc1" onchange="showdcgd1(this.value)" ><option value="DC1">Chọn dây chuyền GĐ1,CĐ</option>' + printdcgd1 + '</select>';
	document.getElementById("cont").innerHTML = '';
	document.getElementById("myseach").value = "";
	seach();
}

function showdcgd1(str) { //hien thi gia tri gd1, cd
	var dataall = "";

			var valobj = Object.values(obj.gd1[i])

			for (j = 0;j < keyobj.length; j++) {

						if(keyobj[j] != "BTP"){ // khong hien thi BTP							
							if(keyobj[j] != "MÃ ĐƠN"){ // khong hien thi ma don
								datael = datael + printgd1(i, nhomd, nhomds, nhomdc, keyobj[j], valobj[j], btpview)	//vi tri, chuoi vi tri bat dau, chuoi vi tri so luyen, chuoi vi tri su cuc

function showdcgdc(str) { // hien thi du lieu gdc

						if(keyobj[j] != "BTP"){

}

function caldata(val, ch, tole, rou) { //tinh hieu chinh (gia tri, kenh, %gia tri, lam tron)
 var result;
 var value = parseFloat(val)
 var denta = (value * tole)/100
 result = (ch == 0) ? value - denta : value + denta;
 return result.toFixed(rou);
}

function printgd1(stt, index, indexs, indexc, key, val, btpw) {
	var data;
	if(key == "HD10 GĐ1 (kg)" || key == "HD23 GĐ1 (g)" || key == "HD11" || key == "HD12" || key == "HD13" || key == "HD14" || key == "HD10 GĐ2 (kg)"){ //in du lieu hieu chinh hoa deo
		if(stt < parseInt(index[0], 10)){ //hien thi chinh HD23 radial
			for (n = 0; n < indexs.length; n++) {
				if(indexs[n] == i){ // hieu chinh hd23 dung so luyen
					data = '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>800</td></tr>'
				}
			}
			for (n = 0; n < indexc.length; n++) {
				if(indexc[n] == i){ // hieu chinh hd23 dung su cuc
					data = '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>950</td></tr>'
				}
			}
		}
		else if(i >= parseInt(index[0], 10) && i < parseInt(index[1], 10)){ //hien thi chinh dau nhom 3
			if(btpw == "C12" || btpw == "C21"){ // khong chinh dau C12, C21
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
			}
			else{ // chinh dau 50% con lai
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 50, 2) +'</td><td>'+ caldata(val, 1, 50, 2) +'</td></tr>'	
			}
		}
		else if(i >= parseInt(index[1], 10) && i < parseInt(index[2], 10)){ //hien thi chinh dau nhom 4
			if(key == "HD23 GĐ1 (g)"){ //chinh hd23
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>580</td></tr>'
			}
			else{
				if(btpw == "C41" || btpw == "C42"){ //khong chinh dau C41, C42
					data = '<tr><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
				}
				else if(btpw == "Y41" || btpw == "Y42"){ // chinh dau 50% Y41, Y42
					data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 50, 2) +'</td><td>'+ caldata(val, 1, 50, 2) +'</td></tr>'
				}
				else { // chinh dau 40% con lai
					data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 40, 2) +'</td><td>'+ caldata(val, 1, 40, 2) +'</td></tr>'
				}
			}
		}
		else if(i >= parseInt(index[2], 10)){ //hien thi chinh dau nhom 6
			if(key == "HD23 GĐ1 (g)"){ //chinh hd23
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>0</td><td>580</td></tr>'
			}
			else {
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
			}
		}
	} 
	else{ //in du lieu khac
		if(key == "KL GĐ1 CHƯA HÓA DẺO (kg)" || key == "KL GĐ2 CHƯA HÓA DẺO (kg)"){ //doi mau khoi luong chua dau
			data = '<tr style="color:red"><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
		}
		else if(key == "KL CAO SU GĐ2 (kg)"){ //phan biet gd2
			data = '<tr style="background-color:#DEB887"><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
		} 
		else if(key == "KL CAO SU GĐ3 (kg)"){ //phan biet gd3
			data = '<tr style="background-color:#5F9EA0"><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
		}
		else if(key == "THỜI GIAN GĐ1" || key == "THỜI GIAN GĐ2" || key == "THỜI GIAN GĐ3"){ // hien thi thoi gian 
			data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 10, 0) +'</td><td>'+ caldata(val, 1, 10, 0) +'</td></tr>'
		}
		else if(key == "TỐC ĐỘ GĐ1" || key == "TỐC ĐỘ GĐ2" || key == "TỐC ĐỘ GĐ3"){ // hien thi toc do
			if(val.length <= 2){ // toc do khong doi
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 10, 0) +'</td><td>'+ caldata(val, 1, 10, 0) +'</td></tr>'
			}
			else { //toc do thay doi
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>-10%</td><td>+10%</td></tr>'
			}
		}
		else{ //in du lieu con lai khong hieu chinh
			data = '<tr><td>' + key + '</td><td>' + val + '</td><td></td><td></td></tr>'
		}
	}
	return data;
}

		}

		if(key == "PT01 (g)"){ // hieu chinh 50% PT01, XT10-39

		}
		else if(key == "THỜI GIAN"){ //hieu chinh thoi gian 10%
			data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 10, 0) +'</td><td>'+ caldata(val, 1, 10, 0) +'</td></tr>'
		}
		else if(key == "TỐC ĐỘ"){
			if(val.length <= 2){ // toc do khong doi
				data = '<tr><td>' + key + '</td><td>' + val + '</td><td>'+ caldata(val, 0, 10, 0) +'</td><td>'+ caldata(val, 1, 10, 0) +'</td></tr>'
			}
			else{ // toc do thay doi
				data = '<tr><td>' + key + '</td><td>' +val + '</td>-10%<td></td><td>+10%</td></tr>'
			}
		}
		else{ // hien thi gia tri con lai
			data = '<tr><td>' + key + '</td><td>' +val + '</td> <td></td><td> </td></tr>'	
		}
	}
	return data;
}

function redirect(address) {
	var timecookie = 365*24*60*60;
	var types = "HD23";
	var factory = "RADIAL";
	var cookieValue = document.cookie.replace(/(?:(?:^|.*;\s*)correction\s*\=\s*([^;]*).*$)|^.*$/, "$1");
	if (cookieValue == ''){
		let setcookie = JSON.stringify({'type': types, 'factory': factory});
		document.cookie = "correction=" + setcookie + "; max-age=" + timecookie + "; path=/";
	}
	else {
		var cookieObj = JSON.parse(cookieValue);
		types = cookieObj.type;
		let setcookie = JSON.stringify({'type': types, 'factory': factory});
		document.cookie = "correction=" + setcookie + "; max-age=" + timecookie + "; path=/";
	}
	if (address == "view" ){
		location.href = '../hieuchinh/view.html';
	}
	else if (address == "code" ){
		location.href = '../congcu/macode.html';
	}
	else location.href = 'DPC'+ factory +'.html';
}
</script>
